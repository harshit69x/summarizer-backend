services:
  - type: web
    name: yt-study-assistant-backend
    env: node
    region: oregon
    buildCommand: "apt-get update && apt-get install -y ffmpeg python3 python3-pip && pip3 install --break-system-packages yt-dlp && npm install && npm run build"
    startCommand: "npm start"
    envVars:
      - key: NODE_ENV
        value: production
